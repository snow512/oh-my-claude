name: guidance-promote
description: >
  프로젝트 GEMINI.md 의 LLM 지침 중 generic 한 rule 을 user (global) ~/.gemini/GEMINI.md 로 승격.
  cup-guidance-<category> marker 로 wrap 하여 cup 이 관리 가능하게 만든다.
  트리거: promote guidance, 지침승격해, 이거 글로벌에 올려, user guidance 로 옮겨
tools: shell, read_file, write_file, edit_file, glob, grep
user-invocable: true
